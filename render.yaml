services:
  - type: web
    name: rescuelink-backend
    runtime: python
    plan: free
    region: singapore
    rootDir: backend
    branch: master
    healthCheckPath: /api/health/
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate
    startCommand: gunicorn config.wsgi:application --bind 0.0.0.0:$PORT
    envVars:
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: ALLOWED_HOSTS
        value: rescuelink-backend-biwl.onrender.com
      - key: CORS_ALLOWED_ORIGINS
        value: https://rescuelink-frontend.vercel.app
      - key: CSRF_TRUSTED_ORIGINS
        value: https://rescuelink-frontend.vercel.app
      - key: DJANGO_ADMIN_URL
        sync: false
      - key: SECURE_SSL_REDIRECT
        value: "True"
      - key: SUPABASE_PROJECT_REF
        sync: false
      - key: SUPABASE_STORAGE_ENDPOINT
        sync: false
      - key: SUPABASE_STORAGE_REGION
        value: ap-northeast-1
      - key: SUPABASE_S3_ACCESS_KEY_ID
        sync: false
      - key: SUPABASE_S3_SECRET_ACCESS_KEY
        sync: false
      - key: SUPABASE_STORAGE_BUCKET
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: OPENROUTER_MODEL
        value: openai/gpt-oss-120b:free
      - key: OPENROUTER_FALLBACK_MODEL
        value: nvidia/nemotron-3-super:free
      - key: OPENROUTER_SAFETY_MODEL
        value: nvidia/nemotron-3.5-content-safety:free
      - key: OPENROUTER_SITE_URL
        sync: false
      - key: OPENROUTER_APP_NAME
        value: RescueLink
      - key: AI_PRIORITY_ENABLED
        value: "true"
      - key: AI_ABUSE_DETECTION_ENABLED
        value: "true"
      - key: AI_PRIORITY_TIMEOUT_SECONDS
        value: "20"
      - key: AI_REVIEW_THRESHOLD
        value: "70"
      - key: AI_AUTO_SUSPEND_THRESHOLD
        value: "90"
      - key: MAX_EMERGENCY_PHOTO_BYTES
        value: "5242880"
      - key: MAX_EMERGENCY_PHOTOS
        value: "5"
      - key: JWT_ACCESS_TOKEN_HOURS
        value: "1"
      - key: JWT_REFRESH_TOKEN_DAYS
        value: "7"
      - key: API_PAGE_SIZE
        value: "50"
      - key: THROTTLE_ANON
        value: 60/hour
      - key: THROTTLE_USER
        value: 600/hour
      - key: THROTTLE_LOGIN
        value: 10/minute
      - key: THROTTLE_REGISTRATION
        value: 5/hour
      - key: THROTTLE_REPORT_CREATE
        value: 10/hour
      - key: THROTTLE_IMAGE_UPLOAD
        value: 20/hour
      - key: THROTTLE_STAFF_ACTION
        value: 120/hour
      - key: THROTTLE_ADMIN_ACTION
        value: 120/hour
